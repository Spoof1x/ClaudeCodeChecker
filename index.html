<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaudeChecker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='%23d97757'%20stroke-width='2.4'%20stroke-linecap='round'%3E%3Cpath%20d='M12%2012L21.5%2012'/%3E%3Cpath%20d='M12%2012L17.2%209'/%3E%3Cpath%20d='M12%2012L16.75%203.77'/%3E%3Cpath%20d='M12%2012L12%206'/%3E%3Cpath%20d='M12%2012L7.25%203.77'/%3E%3Cpath%20d='M12%2012L6.8%209'/%3E%3Cpath%20d='M12%2012L2.5%2012'/%3E%3Cpath%20d='M12%2012L6.8%2015'/%3E%3Cpath%20d='M12%2012L7.25%2020.23'/%3E%3Cpath%20d='M12%2012L12%2018'/%3E%3Cpath%20d='M12%2012L16.75%2020.23'/%3E%3Cpath%20d='M12%2012L17.2%2015'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --panel:#0f0f0f; --card:#131313; --line:#1e1e1e; --line2:#2a2a2a;
  --txt:#f4f4f5; --dim:#8a8a8f; --dim2:#5f5f63; --acc:#fafafa;
  --claude:#d97757; --claude2:#c8634a;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--txt);
  font:14px/1.5 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.wrap{max-width:1040px;margin:0 auto;padding:28px 22px 90px}
.brand{display:flex;align-items:baseline;gap:9px;margin:0}
.brand .logo{display:flex;align-self:center;line-height:0}
.brand h1{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0}
.brand small{color:var(--dim2);font-size:12px;letter-spacing:.02em}

.file{display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  border:1px solid var(--line2);border-radius:10px;padding:9px 13px;color:var(--dim);
  font-size:13px;transition:.15s;white-space:nowrap}
.file:hover{border-color:#3a3a3a;color:var(--txt)}
.file input{display:none}
.file .name{color:var(--txt);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
input.txt{flex:1;min-width:160px;background:#0b0b0b;border:1px solid var(--line2);
  color:var(--txt);border-radius:10px;padding:9px 12px;font:inherit;font-size:13px}
input.txt::placeholder{color:var(--dim2)}
input.txt:focus{outline:none;border-color:#3a3a3a}
.check{margin-left:auto;background:var(--claude);color:#fff;border:0;border-radius:10px;
  padding:10px 20px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.check:hover{background:var(--claude2)}
.check:disabled{opacity:.5;cursor:default}
.tokbtn{min-width:250px;margin-left:0}
.status{margin:12px 2px 0;color:var(--dim);font-size:13px;min-height:18px}
.status.err{color:#fff}

.app{display:flex;align-items:stretch;min-height:100vh}
.rail{flex:none;width:460px;background:var(--panel);border-right:1px solid var(--line);
  position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto;
  padding:18px;display:flex;flex-direction:column;gap:14px}
.rail .brand{padding:2px 4px}
.rail .gtabs{display:flex;gap:3px}
.rail .gtabs button{flex:1}
.content{flex:1;min-width:0;padding:26px 28px 80px}
#cc-controls .file{width:100%;justify-content:center}
#cc-controls .txt{flex:none;width:100%}
#cc-controls .mini{width:100%}
#cc-controls .check{width:100%;margin-left:0;text-align:center}
#cc-controls .status{margin:4px 0 0}
#settings{display:flex;flex-direction:column;gap:10px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.set-row label{color:var(--dim);font-size:13px}
.numin{width:78px;background:#0b0b0b;border:1px solid var(--line2);color:var(--txt);
  border-radius:8px;padding:7px 9px;font:inherit;font-size:13px;text-align:center;
  -moz-appearance:textfield;appearance:textfield}
.numin::-webkit-outer-spin-button,.numin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.numin:focus{outline:none;border-color:#3a3a3a}
.cc-lbl{display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;
  font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);font-weight:700;margin:8px 0 2px}
.cc-lbl::before,.cc-lbl::after{content:"";flex:1;height:1px;background:var(--line2)}
@media(max-width:760px){
  .app{flex-direction:column}
  .rail{position:static;width:auto;height:auto;border-right:0;border-bottom:1px solid var(--line)}
  .content{padding:16px;max-width:none}
}

.tabs{display:flex;gap:2px;margin:30px 0 0;border-bottom:1px solid var(--line)}
.tabs button{background:transparent;border:0;color:var(--dim);font:inherit;font-size:14px;
  font-weight:500;padding:12px 16px;cursor:pointer;position:relative;transition:.15s}
.tabs button:hover:not(:disabled){color:var(--txt)}
.tabs button[aria-selected=true]{color:var(--txt)}
.tabs button[aria-selected=true]::after{content:"";position:absolute;left:12px;right:12px;
  bottom:-1px;height:2px;background:var(--acc);border-radius:2px}
.tabs button:disabled{color:var(--dim2);cursor:default}

.panels{margin-top:26px}
.panel[hidden]{display:none}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;align-items:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.card h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);
  margin:0 0 14px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline}
.row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-top:1px solid var(--line)}
.row:first-of-type{border-top:0}
.row .k{color:var(--dim);font-size:13px}
.row .v{color:var(--txt);text-align:right;font-weight:500;font-size:13px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:64%}
.row .v.mono{font-variant-numeric:tabular-nums;letter-spacing:.01em}
.badge{display:inline-block;border:1px solid var(--line2);border-radius:999px;
  padding:2px 10px;font-size:11px;font-weight:600;color:var(--txt)}
.badge.solid{background:var(--acc);color:#0a0a0a;border-color:var(--acc)}
.badge.bpaid{background:#0e2a16;border-color:#1f5132;color:#3ad07a}
.badge.bvoid{background:#2a0f0f;border-color:#5a2424;color:#ff6b6b}
.badge.bopen{background:#2a230d;border-color:#5a4a1f;color:#e3b341}
.cardsep{height:1px;background:var(--line);margin:16px 0}
.tokout{margin-top:14px}
.tokok{display:flex;flex-direction:column;gap:9px;background:#0e2a16;border:1px solid #1f5132;border-radius:10px;padding:14px;align-items:flex-start}
.tokval{font-size:12px;word-break:break-all;color:#3ad07a;line-height:1.5}
.tokok .mini{background:#1f5132;border:1px solid #3ad07a;color:#d6ffe6;font-weight:600;padding:7px 16px}
.tokok .mini:hover:not(:disabled){background:#2a6e44;border-color:#7ef0a8;color:#fff}
.tokerr{background:#2a0f0f;border:1px solid #5a2424;color:#ff6b6b;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;word-break:break-word}
.oaurl{width:100%;min-height:62px;resize:vertical;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;scrollbar-width:thin;scrollbar-color:#3a3a3a transparent}
.oaurl::-webkit-scrollbar{width:10px;height:10px}
.oaurl::-webkit-scrollbar-track{background:transparent;margin:4px 0}
.oaurl::-webkit-scrollbar-thumb{background:#2c2c2c;border:2px solid #0b0b0b;border-radius:8px}
.oaurl::-webkit-scrollbar-thumb:hover{background:var(--claude)}
.oaurl::-webkit-scrollbar-corner{background:transparent}
.bctl{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.bctl-h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim2);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.bctl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bin{flex:1 1 90px;min-width:80px}
.ifilters{display:flex;gap:6px;margin:2px 0 14px;flex-wrap:wrap}
.ichip{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);
  border-radius:999px;padding:3px 11px;font:inherit;font-size:11px;font-weight:600;cursor:pointer;
  text-transform:uppercase;letter-spacing:.03em;color:var(--txt);transition:.12s}
.ichip .icnt{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums}
.ichip.i-paid{border-color:#1f5132;color:#3ad07a}
.ichip.i-void{border-color:#5a2424;color:#ff6b6b}
.ichip.i-open{border-color:#5a4a1f;color:#e3b341}
.ichip.off{opacity:.4;color:var(--dim2);border-color:var(--line)}
.ichip.off .icnt{color:var(--dim2)}
.gfilters{display:flex;flex-direction:column;gap:8px;margin:0 0 16px}
.gfrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.gflabel{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim2);font-weight:600;min-width:58px}
.muted{color:var(--dim)}
.big{font-size:34px;font-weight:300;letter-spacing:-.02em;font-variant-numeric:tabular-nums}

.u{padding:14px 0;border-top:1px solid var(--line)}
.u:first-child{border-top:0;padding-top:0}
.u .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.u .top .lab{font-size:13px;color:var(--txt);font-weight:500}
.u .top .pct{font-size:22px;font-weight:300;font-variant-numeric:tabular-nums}
.track{height:6px;background:#202020;border-radius:6px;overflow:hidden}
.track>i{display:block;height:100%;background:var(--acc);border-radius:6px;transition:width .5s ease}
.u .sub{margin-top:7px;color:var(--dim2);font-size:12px}

.pgsum{color:var(--dim2);font-weight:400;font-size:11px;text-transform:none;letter-spacing:0}
.item{padding:13px 0;border-top:1px solid var(--line)}
.item:first-child{border-top:0}
.item .h{display:flex;justify-content:space-between;align-items:center;gap:12px}
.item .h .t{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .meta{color:var(--dim);font-size:12px;margin-top:3px}
.item .scope{color:var(--dim2);font-size:11px;margin-top:5px;word-break:break-word;line-height:1.5}
.dotg{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px;
  background:#3ad07a;vertical-align:1px}
.dotr{background:#666}
.mini{background:transparent;border:1px solid var(--line2);color:var(--dim);border-radius:8px;
  padding:5px 11px;font:inherit;font-size:12px;font-weight:500;text-transform:none;letter-spacing:normal;
  cursor:pointer;transition:.15s;white-space:nowrap}
.mini:hover:not(:disabled){border-color:var(--txt);color:var(--txt)}
.mini.danger:hover:not(:disabled){border-color:#e5484d;color:#ff6b6b}
.mini:disabled{opacity:.4;cursor:default}

.pgnav{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-top:14px;
  padding-top:12px;border-top:1px solid var(--line);color:var(--dim)}
.pgnav span{font-size:12px;font-variant-numeric:tabular-nums}
.pgnav button{background:transparent;border:1px solid var(--line2);color:var(--txt);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;transition:.15s}
.pgnav button:hover:not(:disabled){border-color:var(--txt)}
.pgnav button:disabled{opacity:.35;cursor:default}

a{color:var(--txt);text-decoration:none;border-bottom:1px solid var(--line2)}
a:hover{border-color:var(--txt)}
.empty{color:var(--dim2);font-size:13px;padding:8px 0}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--line2);
  border-top-color:var(--txt);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

.gtabs{display:inline-flex;gap:3px;background:#121212;border:1px solid var(--line);border-radius:11px;padding:3px}
.gtabs button{background:transparent;border:0;color:var(--dim);font:inherit;font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:8px;cursor:pointer;transition:.15s}
.gtabs button:hover{color:var(--txt)}
.gtabs button[aria-selected=true]{background:var(--claude);color:#fff}

.padd{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.padd textarea{width:100%;background:#0b0b0b;border:1px solid var(--line2);color:var(--txt);
  border-radius:10px;padding:12px 14px;font:13px/1.6 ui-monospace,Menlo,monospace;resize:vertical;min-height:120px}
.padd textarea::placeholder{color:var(--dim2)}
.padd textarea:focus{outline:none;border-color:#3a3a3a}
.prow{display:flex;gap:12px;margin-top:12px;align-items:center}
.prow .grow{flex:1}
.phint{font-size:12px}

.ptoolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:22px 0 0}
.ptools-l,.ptools-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sel{background:#0e0e0e;border:1px solid var(--line2);color:var(--txt);border-radius:9px;
  padding:8px 11px;font:inherit;font-size:13px;cursor:pointer}
.sel:focus{outline:none;border-color:#3a3a3a}
.chk{display:inline-flex;align-items:center;gap:7px;color:var(--dim);font-size:13px;cursor:pointer;
  user-select:none;border:1px solid var(--line2);border-radius:9px;padding:7px 12px}
.chk input{appearance:none;-webkit-appearance:none;margin:0;cursor:pointer;flex:none;
  width:18px;height:18px;border:1.5px solid var(--line2);border-radius:6px;background:#0e0e0e;
  position:relative;transition:border-color .12s,background .12s}
.chk input:hover{border-color:#3a3a3a}
.chk input:checked{background:#3ad07a;border-color:#3ad07a}
.chk input:checked::after{content:"";position:absolute;left:5px;top:1.5px;width:4px;height:8px;
  border:solid #07240f;border-width:0 2px 2px 0;transform:rotate(45deg)}
.pcount{margin:18px 2px 12px;font-size:12.5px;color:var(--dim)}
.st-ok-t{color:#3ad07a}.st-bad-t{color:#ff6b6b}

.ptable{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--card)}
.ptable-head,.prow2{display:grid;
  grid-template-columns:36px minmax(0,1fr) 104px 128px minmax(0,1.1fr) 162px;align-items:center;gap:14px;padding:0 16px}
.ptable-head{height:42px;border-bottom:1px solid var(--line);color:var(--dim2);
  font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.prow2{min-height:54px;border-bottom:1px solid var(--line);transition:background .12s}
.prow2:last-child{border-bottom:0}
.prow2:hover{background:#171717}
.prow2.off{opacity:.45}
.prow2 .purl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.pu{color:var(--dim2);font-size:12px;margin-left:8px}
.prow2 .pmeta{color:var(--dim);font-size:12px;font-variant-numeric:tabular-nums}
.prow2 .ptags{display:flex;gap:5px;flex-wrap:wrap}
.ptag{border:1px solid var(--line2);color:var(--dim);border-radius:5px;padding:1px 7px;font-size:11px}
.ptype{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);color:var(--dim);background:transparent;border-radius:6px;padding:2px 8px;font:inherit;font-size:11px;cursor:pointer;transition:.12s;line-height:1.5}
.ptype:hover{border-color:var(--claude);color:var(--txt)}
.pcaret{font-size:8px;color:var(--dim2);transition:.12s}
.ptype:hover .pcaret{color:var(--claude)}
.pmenu{position:fixed;z-index:9999;background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:5px;min-width:128px;box-shadow:0 12px 32px rgba(0,0,0,.55);animation:pmenuIn .12s ease}
@keyframes pmenuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.pmenu-h{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim2);padding:4px 8px 6px;font-weight:600}
.pmenu-i{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;background:transparent;border:0;border-radius:7px;color:var(--txt);font:inherit;font-size:12px;padding:7px 9px;cursor:pointer;transition:.1s}
.pmenu-i:hover{background:#1d1d1d}
.pmenu-i.on{color:var(--claude)}
.pmk{color:var(--claude);font-size:11px}
.pact{display:flex;gap:6px;justify-content:flex-end;align-items:center}
.ic{background:transparent;border:1px solid var(--line2);color:var(--dim);width:30px;height:30px;border-radius:8px;
  cursor:pointer;font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
.ic:hover{border-color:var(--txt);color:var(--txt)}
.ic.danger:hover{border-color:#e5484d;color:#ff6b6b}
.pempty{padding:34px 18px;text-align:center;border:1px dashed var(--line2);border-radius:13px}
.badge.st-ok{border-color:#1f5f3a;color:#3ad07a}
.badge.st-bad{border-color:#5a2222;color:#ff6b6b}
.badge.st-warn{border-color:#5a4a1f;color:#e3b341}
.badge.st-off{border-color:var(--line2);color:var(--dim2)}
.badge.st-dim{border-color:var(--line2);color:var(--dim2)}
.badge .spin{margin:0;width:10px;height:10px;border-width:2px;vertical-align:-1px}

.subtabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:0 0 18px}
.subtabs button{background:transparent;border:0;color:var(--dim);font:inherit;font-size:13px;font-weight:700;
  letter-spacing:.04em;padding:11px 16px;cursor:pointer;position:relative;transition:.15s}
.subtabs button:hover{color:var(--txt)}
.subtabs button[aria-selected=true]{color:var(--txt)}
.subtabs button[aria-selected=true]::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;
  height:2px;background:var(--claude);border-radius:2px}
.subsep{color:var(--line2);align-self:center;padding:0 3px;user-select:none;font-weight:400}
.subtabs .acctab{display:inline-flex;align-items:center;gap:7px;max-width:210px;font-weight:600}
.acctab-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.acctab-p{font-size:9px;font-weight:600;color:var(--dim2);border:1px solid var(--line2);
  border-radius:5px;padding:1px 5px;white-space:nowrap}
.acctab-x{color:var(--dim2);font-size:11px;padding:0 1px;border-radius:4px;line-height:1}
.acctab-x:hover{color:#ff6b6b}
.dhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.dproxy{font-size:13px;display:inline-flex;align-items:center;gap:7px;min-width:0}
.dproxy .mono{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:460px}
.dchecked{margin-left:auto;font-size:13px;color:var(--dim);white-space:nowrap}
.spin-btn svg{animation:sp .7s linear infinite}
.dbanner{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  background:#15110a;border:1px solid #3a2d12;color:#e3b341;border-radius:11px;padding:11px 16px;margin:0 0 16px;font-size:13px}
.dbanner .check{padding:7px 16px;white-space:nowrap}
.pglist{border-top:1px solid var(--line);margin-top:2px}
[data-panel=sessions] .grid,[data-panel=balance] .grid,[data-panel=account] .grid{align-items:stretch}
[data-panel=sessions] .card,[data-panel=balance] .card,[data-panel=account] .card{height:100%}
.bhead,.brow{grid-template-columns:32px minmax(150px,1.6fr) minmax(86px,0.9fr) minmax(90px,0.95fr) minmax(80px,0.9fr) minmax(56px,0.65fr) minmax(56px,0.65fr) minmax(64px,0.75fr) minmax(86px,1fr) minmax(74px,0.85fr) 40px}
#btableWrap{overflow-x:auto}
.ynok{color:#3ad07a;font-weight:700}
.ynno{color:#ff6b6b;font-weight:700}
#sub-baza .ptools-r .mini,#sub-baza .ptools-r .sel{height:34px;padding:0 14px;font-size:13px;display:inline-flex;align-items:center}
#sub-baza .ptools-l .file{height:34px;padding:0 16px;border-color:var(--line2);color:var(--txt);font-weight:600}

<script>
function esc(t){return (t==null?'':String(t)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function row(k,v,mono){return `<div class="row"><span class="k">${esc(k)}</span><span class="v ${mono?'mono':''}">${v==null||v===''?'<span class=muted>—</span>':v}</span></div>`}
function card(title,inner){return `<div class="card"><h2>${esc(title)}</h2>${inner}</div>`}
function fmt(ts){if(!ts)return null;const d=new Date(ts);if(isNaN(d))return ts;
  return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtChk(sec){if(!sec)return '';const d=new Date(sec*1000);if(isNaN(d))return '';
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)} | ${p(d.getHours())}:${p(d.getMinutes())}`;}
function fmtDM(v){if(v==null||v==='')return '';const d=new Date(typeof v==='number'&&v<1e12?v*1000:v);
  if(isNaN(d))return '';const p=n=>String(n).padStart(2,'0');return `${p(d.getDate())}.${p(d.getMonth()+1)}`;}
function yn(v){return v==null?'<span class="muted">—</span>':(v?'<span class="ynok">✓</span>':'<span class="ynno">✕</span>');}
let CONLOG=[];let _conT=null;
function _conSave(){if(_conT)clearTimeout(_conT);
  _conT=setTimeout(()=>{try{sessionStorage.setItem('cc.conlog',JSON.stringify(CONLOG.slice(-300)));}catch(e){}},400);}
function conLine(e){
  const log=document.getElementById('con-log');if(!log)return;
  const atTop=log.scrollTop<24;
  const s=window.getSelection&&window.getSelection();
  const selecting=s&&!s.isCollapsed&&log.contains(s.anchorNode);
  const parts=(e.cols||[]).map(c=>esc(String(c)));
  const line=document.createElement('div');
  line.className='clog '+(e.level||'info');
  line.innerHTML=`<span class="t">${esc(e.ts)}</span><span class="sep">│</span>`+parts.join('<span class="sep">│</span>');
  const before=log.scrollHeight;
  log.insertBefore(line,log.firstChild);
  if(atTop&&!selecting)log.scrollTop=0;
  else log.scrollTop+=log.scrollHeight-before;
  while(log.children.length>600)log.removeChild(log.lastChild);
}
function clog(cols,level){
  if(typeof document==='undefined')return;
  const t=new Date();const p=n=>String(n).padStart(2,'0');
  const e={ts:`${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`,level:level||'info',cols:(Array.isArray(cols)?cols:[cols]).map(String)};
  CONLOG.push(e);if(CONLOG.length>320)CONLOG.shift();
  conLine(e);_conSave();
}
function conRestore(){
  try{const a=JSON.parse(sessionStorage.getItem('cc.conlog')||'[]');
    if(Array.isArray(a)){CONLOG=a.slice(-300);CONLOG.forEach(conLine);}}catch(e){}
}
function day(ts){if(!ts)return null;const d=new Date(ts);if(isNaN(d))return ts;
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})}
function tsday(sec){return sec?day(sec*1000):null}
function money(cents,cur){if(cents==null)return null;
  try{return (cents/100).toLocaleString('ru-RU',{style:'currency',currency:(cur||'USD').toUpperCase()})}
  catch(e){return (cents/100)+' '+(cur||'').toUpperCase()}}

function planLabel(s){
  const p=(s.plan||'').trim();if(!p)return '—';
  if(/max/i.test(p)){const t=(s.tier||'')+'';
    if(/20/.test(t))return 'MAX x20';if(/(^|[^0-9])5/.test(t))return 'MAX x5';return 'MAX';}
  if(/enterprise|raven/i.test(p))return 'ENTERPRISE';
  if(/team/i.test(p))return 'TEAM';
  if(/pro/i.test(p))return 'PRO';
  if(/free/i.test(p))return 'FREE';
  return p.toUpperCase();
}
function accBalance(s){
  const cur=s.currency||'USD';
  const used=money(s.used!=null?s.used:0,cur);
  return s.limit!=null?`${used} / ${money(s.limit,cur)}`:used;
}

function paginate(items,page,size){
  items=items||[];const total=items.length;const pages=Math.max(1,Math.ceil(total/size));
  page=Math.min(Math.max(0,page),pages-1);const start=page*size;
  return {slice:items.slice(start,start+size),page,pages,total,
          from:total?start+1:0,to:Math.min(total,start+size)};
}

function ubar(label,b){
  if(!b||b.utilization==null)return '';
  const p=Math.round(b.utilization);
  const col=p>=90?'#ff6b6b':'#d97757';

const PAGERS={};
class Pager{
  constructor(opts){this.id=opts.id;this.mountId=opts.mountId;this.title=opts.title;
    this.items=opts.items||[];this.size=opts.size||5;this.renderItem=opts.renderItem;
    this.empty=opts.empty||'пусто';this.headBtn=opts.headBtn||'';this.page=0;
    this.filters=opts.filters||null;this.filterFor=opts.filterFor||null;
    this.active=new Set((this.filters||[]).map(f=>f.key));
    PAGERS[this.id]=this;this.render();}
  setItems(items){this.items=items||[];this.render();}
  view(){if(!this.filters)return this.items;
    return this.items.filter(it=>{const k=this.filterFor(it);return k==null||this.active.has(k);});}
  toggle(key){if(this.active.has(key))this.active.delete(key);else this.active.add(key);this.page=0;this.render();}
  go(delta){const p=paginate(this.view(),this.page+delta,this.size);this.page=p.page;this.render();}
  render(){
    const p=paginate(this.view(),this.page,this.size);
    const body=p.total?p.slice.map(this.renderItem).join(''):`<div class="empty">${esc(this.empty)}</div>`;
    const nav=p.pages>1?`<div class="pgnav">
      <button onclick="PAGERS['${this.id}'].go(-1)" ${p.page===0?'disabled':''}>‹</button>
      <span>${p.page+1} / ${p.pages}</span>
      <button onclick="PAGERS['${this.id}'].go(1)" ${p.page>=p.pages-1?'disabled':''}>›</button></div>`:'';
    const sum=p.pages>1?`<span class="pgsum">${p.from}–${p.to} из ${p.total}</span>`:'';
    const hb=(p.total>0&&this.headBtn)?this.headBtn:'';
    let chips='';
    if(this.filters){
      const cnt={};this.items.forEach(it=>{const k=this.filterFor(it);if(k!=null)cnt[k]=(cnt[k]||0)+1;});
      chips='<div class="ifilters">'+this.filters.map(f=>
        `<button class="ichip i-${esc(f.key)}${this.active.has(f.key)?'':' off'}" onclick="PAGERS['${this.id}'].toggle('${esc(f.key)}')">${esc(f.label)}<span class="icnt">${cnt[f.key]||0}</span></button>`).join('')+'</div>';
    }
    const el=document.getElementById(this.mountId);
    if(el)el.innerHTML=`<div class="card"><h2><span class="ttl">${esc(this.title)} ${sum}</span>${hb}</h2>${chips}
      <div class="pglist">${body}</div>${nav}</div>`;
  }
}

  let VAULT=[]; const bsel=new Set();

  let bsort=null;
  const BSORT_DEF={name:1,status:1,balance:-1,sub:-1,auto:-1,card:-1,renew:1,id:1,cookie:1};
  function _bstatrank(s){return ({valid:0,unchecked:1,nd:2,disabled:3,invalid:4})[s]!=null?({valid:0,unchecked:1,nd:2,disabled:3,invalid:4})[s]:9;}
  function sortVault(list){
    if(!bsort)return list;
    const k=bsort.key,d=bsort.dir;
    return list.slice().sort((a,b)=>{
      let x,y;
      if(k==='balance'){x=a.balance||0;y=b.balance||0;}
      else if(k==='sub'){x=planRank(a.plan,a.tier);y=planRank(b.plan,b.tier);}
      else if(k==='status'){x=_bstatrank(bstat(a));y=_bstatrank(bstat(b));}
      else if(k==='auto'){x=a.auto_renew?1:0;y=b.auto_renew?1:0;}
      else if(k==='card'){x=a.has_payment?1:0;y=b.has_payment?1:0;}
      else if(k==='renew'){x=a.renew||'';y=b.renew||'';}
      else if(k==='id'){x=(a.id||'').toLowerCase();y=(b.id||'').toLowerCase();}
      else if(k==='cookie'){x=(a.key_tail||'').toLowerCase();y=(b.key_tail||'').toLowerCase();}
      else {x=(a.name||a.email||'').toLowerCase();y=(b.name||b.email||'').toLowerCase();}
      return (x>y?1:x<y?-1:0)*d;
    });
  }

  function bfPass(p){_bfinit();

    const pc=planCat(p.plan,p.tier),bb=balBucket(p.balance);

  async function upgradeAccts(results,tgt){

    if(!elig.length){await window.confirmModal('Некого апгрейдить — все уже на этом тарифе или без карты.',{info:true,okText:'OK'});return;}
    const sk=[];if(already.length)sk.push('уже на тарифе: '+already.length);if(noPmRows.length)sk.push('без карты: '+noPmRows.length);
    const exp=tgt===1?' PRO пока экспериментально — без эндпоинта ничего не спишется.':'';
    if(!await window.confirmModal(`Апгрейд ${elig.length} акк до ${tname} — реальная покупка с привязанных карт.${exp}${sk.length?' Пропущу: '+sk.join(', ')+'.':''}`,{danger:true,okText:'Апгрейд'}))return;

    noPmRows.forEach(r=>out.push({name:r.name,skipped:true,text:'нет карты'}));
    for(const r of elig){

      else if(j&&j.skipped){clog(['АПГРЕЙД',r.name||'—','пропуск: '+(j.error||'нет карты')],'warn');out.push({name:r.name,skipped:true,text:j.error||'нет карты'});}

    const elig=results.filter(r=>r.uuid&&r.has_payment),noPmRows=results.filter(r=>r.uuid&&!r.has_payment);
    if(!elig.length){await window.confirmModal('Не на что пополнять — ни у кого нет привязанной карты.',{info:true,okText:'OK'});return;}
    if(!await window.confirmModal(`Пополнить ${elig.length} акк на $${amount} кредитов — реальное списание ~$${PAID[amount]||amount} с карты.${noPmRows.length?' Без карты пропущу: '+noPmRows.length+'.':''}`,{danger:true,okText:'Пополнить'}))return;
    const out=[];
    noPmRows.forEach(r=>out.push({name:r.name,skipped:true,text:'нет карты'}));
    for(const r of elig){
      clog(['ПОПОЛНЕНИЕ',r.name||'—','+$'+amount+'…'],'act');
      const j=await apost('/api/account/topup',{uuid:r.uuid,amount});
      if(j&&j.ok){clog(['ПОПОЛНЕНИЕ',r.name||'—','готово',j.status||'—'],'ok');out.push({name:r.name,ok:true,text:'+$'+amount+(j.status?' · '+j.status:'')});}
      else if(j&&j.skipped){clog(['ПОПОЛНЕНИЕ',r.name||'—','пропуск: '+(j.error||'нет карты')],'warn');out.push({name:r.name,skipped:true,text:j.error||'нет карты'});}
      else{const e=(j&&j.error)||'ошибка';clog(['ПОПОЛНЕНИЕ',r.name||'—',e],'err');out.push({name:r.name,ok:false,text:e});}
    }
    await showResults('Пополнение · $'+amount,out);
  }
  async function gAction(gid,v){
    const g=GROUPS.find(x=>x.id===gid);if(!g)return;
    const vids=gselFor(gid);if(!vids.length)return;
    if(v==='recheck')return startCheck(vids);
    if(v==='export-netscape')return exportCookies(vids,'netscape');
    if(v==='export-json')return exportCookies(vids,'json');
    if(v==='delete')return delResults(gid,vids);
  }
  $('#groups').addEventListener('change',e=>{
    const cb=e.target.closest('.gsel');
    if(cb){if(cb.checked)gsel.add(cb.dataset.k);else gsel.delete(cb.dataset.k);renderGroups();return;}
    const all=e.target.closest('.gall');
    if(all){const gid=all.dataset.gid,g=GROUPS.find(x=>x.id===gid);if(g){
      g.results.filter(gfPass).forEach(r=>{if(r.vault_id&&r.status!=='pending'){const k=gid+':'+r.vault_id;if(all.checked)gsel.add(k);else gsel.delete(k);}});
      renderGroups();}return;}
    const act=e.target.closest('.gact');
    if(act){const v=act.value;act.value='';if(v)gAction(act.dataset.gid,v);}
  });

  setInterval(()=>{
    if(GROUPS.some(g=>g.status==='running')||activeSub==='checks')loadGroups();
  },1500);

  window.clog=clog;
  conRestore();
  $('#con-clear').addEventListener('click',()=>{$('#con-log').innerHTML='';CONLOG=[];try{sessionStorage.removeItem('cc.conlog');}catch(e){}});
  $$('.cf').forEach(b=>b.addEventListener('click',()=>{
    b.classList.toggle('off');
    $('#con-log').classList.toggle('hide-'+b.dataset.lvl,b.classList.contains('off'));
  }));
  (function(){
    let core='baza';try{core=localStorage.getItem('cc.subtab')||'baza';}catch(e){}
    if(core!=='checks')core='baza';
    lastCore=core;
    let sub=core;try{sub=localStorage.getItem('cc.activesub')||core;}catch(e){}
    if(sub!=='baza'&&sub!=='checks'&&OPENTABS.some(t=>t.uuid===sub))showAccount(sub);
    else setSub(core);
  })();
  loadVault();
  loadGroups();
}

if (typeof module !== 'undefined' && module.exports){
  module.exports={paginate,esc,money,fmt,planLabel,accBalance,renderAccount,renderBalance,renderUsage,sessionItem,tokenItem};
}

</script>
<script>
(function(){
  if (typeof document === 'undefined') return;
  const $=s=>document.querySelector(s);
  const E=t=>(t==null?'':String(t)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const MOCK=!!window.MOCK_PROXIES;
  const ask=(m,o)=>window.confirmModal?window.confirmModal(m,o):Promise.resolve(confirm(m));

  let PROXIES=[];
  let savedTag='';
  const sel=new Set();
  const checking=new Set();
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  function dispStatus(p){return p.enabled===false?'disabled':(p.status||'unchecked');}
  function maskUrl(u){return String(u||'').replace(/(\/\/[^:]+:)[^@]+@/,'$1****@');}
  function hostport(p){
    if(p.host && p.port) return p.host+':'+p.port;
    return String(p.url||'').replace(/^[a-z0-9]+:\/\//i,'').replace(/^[^@]*@/,'');
  }
  function userOf(p){
    if(p.user) return p.user;
    const m=String(p.url||'').match(/\/\/([^:/@]+)(?::[^@]*)?@/);
    return m?m[1]:'';
  }
  function allTags(){const s=new Set();PROXIES.forEach(p=>(p.tags||[]).forEach(t=>s.add(t)));return [...s].sort();}

  function savePF(){try{localStorage.setItem('cc.pfilter',JSON.stringify({status:$('#pfstatus').value,tag:$('#pftag').value}));}catch(e){}}
  function loadPF(){try{const f=JSON.parse(localStorage.getItem('cc.pfilter')||'{}');
    if(f.status)$('#pfstatus').value=f.status; savedTag=f.tag||'';}catch(e){}}

  function filtered(){
    const st=$('#pfstatus').value, tag=$('#pftag').value;
    return PROXIES.filter(p=>{
      if(st && dispStatus(p)!==st) return false;
      if(tag && !(p.tags||[]).includes(tag)) return false;
      return true;
    });
  }

  function counts(){
    const c={total:PROXIES.length,valid:0,invalid:0,unchecked:0,disabled:0};
    PROXIES.forEach(p=>{c[dispStatus(p)]++});return c;
  }

  function badge(s){
    const map={valid:'st-ok',invalid:'st-bad',disabled:'st-off',unchecked:'st-dim',checking:'st-dim'};
    const lbl={valid:'VALID',invalid:'INVALID',disabled:'DISABLED',unchecked:'—',checking:'<span class="spin"></span>'};
    return `<span class="badge ${map[s]}">${lbl[s]}</span>`;
  }

  function row(p){
    const isChk=checking.has(p.id);
    const s=isChk?'checking':dispStatus(p);
    const meta=isChk?'':[p.code?(''+p.code):'',p.latency!=null?(p.latency+' ms'):''].filter(Boolean).join(' · ');
    const scheme=(p.scheme||(p.tags||[])[0]||'http');
    const tags=`<button class="ptype" data-id="${E(p.id)}" data-scheme="${E(scheme)}" title="сменить тип прокси">${E(scheme)}<span class="pcaret">▾</span></button>`;
    const tip=(!isChk&&p.result)?` data-tip="${E(p.result)}"`:'';
    return `<div class="prow2 ${p.enabled===false?'off':''}" data-id="${E(p.id)}">
      <span class="pchk"><input type="checkbox" class="psel" data-id="${E(p.id)}" ${sel.has(p.id)?'checked':''}></span>
      <span class="purl mono" title="${E(maskUrl(p.url))}">${E(hostport(p))}${userOf(p)?` <span class="pu">${E(userOf(p))}</span>`:''}</span>
      <span class="pst"${tip}>${badge(s)}</span>
      <span class="pmeta">${E(meta)||'<span class=muted>—</span>'}</span>
      <span class="ptags">${tags}</span>
      <span class="pact">
        <button class="mini" onclick="PX.check1('${E(p.id)}',this)" ${isChk?'disabled':''}>${isChk?'…':'проверить'}</button>
        <button class="ic" title="вкл/выкл" onclick="PX.toggle1('${E(p.id)}')">⏻</button>
        <button class="ic danger" title="удалить" onclick="PX.del1('${E(p.id)}')">✕</button>
      </span>
    </div>`;
  }

  function syncTagFilter(){
    const cur=$('#pftag').value||savedTag||'';
    $('#pftag').innerHTML='<option value="">тип: все</option>'+allTags().map(t=>`<option value="${E(t)}">${E(t)}</option>`).join('');
    $('#pftag').value=cur; savedTag='';
  }

  function updateControls(){
    const n=selectedIds().length;
    const chk=checking.size>0;
    ['#pcheckSel','#ptoggle','#pdel'].forEach(s=>{const b=$(s);if(b)b.disabled=n===0||chk;});
    const enabled=PROXIES.filter(p=>p.enabled!==false).length;
    const has=PROXIES.length>0;
    $('#pcheckAll').disabled=enabled===0||chk;
    $('#pfstatus').disabled=!has;
    $('#pftag').disabled=!has;
    $('#pall').disabled=filtered().length===0;
  }
  function syncHeadCheckbox(){
    const ids=filtered().map(p=>p.id);
    $('#pall').checked=ids.length>0 && ids.every(id=>sel.has(id));
  }

  function render(){
    syncTagFilter();
    const c=counts();
    $('#pcount').innerHTML=`Всего ${c.total} · <span class="st-ok-t">valid ${c.valid}</span> · <span class="st-bad-t">invalid ${c.invalid}</span> · unchecked ${c.unchecked} · disabled ${c.disabled}`;
    const list=filtered();
    $('#ptable').innerHTML=list.map(row).join('');
    $('#ptableWrap').style.display=list.length?'':'none';
    $('#pempty').style.display=list.length?'none':'';
    syncHeadCheckbox();
    updateControls();
  }

  async function api(url,body){
    if(MOCK) return {ok:true,items:PROXIES};
    try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});return await r.json();}
    catch(e){return {ok:false,error:String(e)};}
  }

  async function load(){
    if(MOCK){PROXIES=window.MOCK_PROXIES.slice();render();return;}
    try{const j=await (await fetch('/api/proxies')).json();PROXIES=j.items||[];}catch(e){PROXIES=[];}
    render();
  }

  function selectedIds(){return [...sel].filter(id=>PROXIES.some(p=>p.id===id));}
  function mockResult(ok){return ok?'HTTP 200 OK':(Math.random()>.5?'TIMEOUT':'CONNECTION REFUSED');}
  function mockCheck(id){const p=PROXIES.find(x=>x.id===id);if(!p)return;
    const ok=Math.random()>.4;p.status=ok?'valid':'invalid';p.code=ok?200:0;
    p.latency=ok?Math.floor(200+Math.random()*900):null;p.result=mockResult(ok);}

  function rdThreads(){const el=document.getElementById('threads');const n=el?parseInt(el.value,10):NaN;
    return (Number.isInteger(n)&&n>=1&&n<=100)?n:1;}
  async function doCheck(ids,body){
    ids=ids.filter(id=>PROXIES.some(p=>p.id===id));
    if(!ids.length)return;
    ids.forEach(id=>checking.add(id));
    render();
    if(window.clog)window.clog(['ПРОКСИ','проверка','шт: '+ids.length,'потоки '+rdThreads()],'act');
    try{
      if(MOCK){await sleep(600);ids.forEach(mockCheck);}
      else{const j=await api('/api/proxies/check',{...body,threads:rdThreads()});if(j.items)PROXIES=j.items;}
    }finally{
      ids.forEach(id=>checking.delete(id));
      render();
    }
    if(window.clog)ids.forEach(id=>{const p=PROXIES.find(x=>x.id===id);if(!p)return;
      const v=p.status==='valid';
      window.clog(['ПРОКСИ',hostport(p),(v?'VALID':'INVALID')+(p.code?' '+p.code:'')+(p.latency!=null?' '+p.latency+'ms':'')],v?'ok':'err');});
  }

  const SCHEMES=['http','https','socks4','socks5','socks5h'];
  let _pmenu=null;
  function closeSchemeMenu(){if(_pmenu){_pmenu.remove();_pmenu=null;
    document.removeEventListener('mousedown',_pmenuOut,true);
    document.removeEventListener('keydown',_pmenuEsc,true);
    window.removeEventListener('resize',closeSchemeMenu);window.removeEventListener('scroll',closeSchemeMenu,true);}}
  function _pmenuOut(e){if(_pmenu&&!_pmenu.contains(e.target)&&!e.target.closest('.ptype'))closeSchemeMenu();}
  function _pmenuEsc(e){if(e.key==='Escape')closeSchemeMenu();}
  function openSchemeMenu(btn){
    if(_pmenu){closeSchemeMenu();return;}
    const id=btn.dataset.id,cur=btn.dataset.scheme;
    const m=document.createElement('div');m.className='pmenu';
    m.innerHTML='<div class="pmenu-h">тип прокси</div>'+SCHEMES.map(s=>
      `<button class="pmenu-i ${s===cur?'on':''}" data-id="${E(id)}" data-scheme="${s}">${s}${s===cur?'<span class="pmk">✓</span>':''}</button>`).join('');
    m.addEventListener('click',e=>{const it=e.target.closest('.pmenu-i');if(!it)return;
      const sc=it.dataset.scheme,pid=it.dataset.id;closeSchemeMenu();
      if(sc!==cur)PX.scheme1(pid,sc);});
    document.body.appendChild(m);
    const r=btn.getBoundingClientRect();
    let top=r.bottom+6,left=r.left;
    const mw=m.offsetWidth,mh=m.offsetHeight;
    if(left+mw>window.innerWidth-8)left=window.innerWidth-mw-8;
    if(top+mh>window.innerHeight-8)top=r.top-mh-6;
    m.style.top=Math.max(8,top)+'px';m.style.left=Math.max(8,left)+'px';
    _pmenu=m;
    setTimeout(()=>{document.addEventListener('mousedown',_pmenuOut,true);
      document.addEventListener('keydown',_pmenuEsc,true);
      window.addEventListener('resize',closeSchemeMenu);window.addEventListener('scroll',closeSchemeMenu,true);},0);
  }

  window.PX={
    async add(){
      const text=$('#pinput').value;
      if(!text.trim())return;
      const btn=$('#padd');btn.disabled=true;
      if(MOCK){
        text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{
          const url=l.includes('://')?l:'http://'+l;
          const scheme=url.split('://')[0].toLowerCase();
          PROXIES.push({id:Math.random().toString(16).slice(2,14),url,scheme,
            tags:[scheme],enabled:true,status:'unchecked',code:null,latency:null,result:null});
        });
      }else{
        const j=await api('/api/proxies/add',{text});if(j.items)PROXIES=j.items;
        const a=j.added||0,u=j.updated||0,dd=j.dupes||0,inv=j.invalid||0;
        if(window.clog)window.clog(['ПРОКСИ','загрузка','+'+a+(u?' · обновлено '+u:'')+(dd?' · дублей '+dd:'')+(inv?' · невалидных '+inv:'')],(u||inv)?'warn':'ok');
      }
      $('#pinput').value='';btn.disabled=false;render();
    },
    async check1(id){await doCheck([id],{ids:[id]});},
    async checkSel(){const ids=selectedIds();if(!ids.length)return;
      busy('#pcheckSel','проверка…');
      await doCheck(ids,{ids});
      unbusy('#pcheckSel','Проверить выбранные');},
    async checkAll(){if(!await ask('Проверить все включённые прокси через запрос к Claude?',{okText:'Проверить'}))return;
      busy('#pcheckAll','проверка…');
      const ids=PROXIES.filter(p=>p.enabled!==false).map(p=>p.id);
      await doCheck(ids,{all:true});
      unbusy('#pcheckAll','Проверить все');},
    async del1(id){if(!await ask('Удалить прокси?',{danger:true,okText:'Удалить'}))return;
      if(MOCK)PROXIES=PROXIES.filter(p=>p.id!==id);else{const j=await api('/api/proxies/delete',{ids:[id]});if(j.items)PROXIES=j.items;}
      sel.delete(id);render();},
    async delSel(){const ids=selectedIds();if(!ids.length)return;
      if(!await ask(`Удалить ${ids.length} прокси?`,{danger:true,okText:'Удалить'}))return;
      if(MOCK)PROXIES=PROXIES.filter(p=>!ids.includes(p.id));else{const j=await api('/api/proxies/delete',{ids});if(j.items)PROXIES=j.items;}
      ids.forEach(id=>sel.delete(id));render();},
    async toggle1(id){const p=PROXIES.find(x=>x.id===id);if(!p)return;const en=p.enabled===false;
      if(MOCK)p.enabled=en;else{const j=await api('/api/proxies/toggle',{ids:[id],enabled:en});if(j.items)PROXIES=j.items;}
      render();},
    async toggleSel(){const ids=selectedIds();if(!ids.length)return;
      const anyOn=PROXIES.some(p=>ids.includes(p.id)&&p.enabled!==false);const en=!anyOn;
      if(MOCK)PROXIES.forEach(p=>{if(ids.includes(p.id))p.enabled=en;});else{const j=await api('/api/proxies/toggle',{ids,enabled:en});if(j.items)PROXIES=j.items;}
      render();},
    async scheme1(id,scheme){const p=PROXIES.find(x=>x.id===id);if(!p||p.scheme===scheme)return;
      const old=p.scheme;
      if(MOCK){p.scheme=scheme;p.tags=[scheme];p.status='unchecked';p.code=null;p.latency=null;p.result=null;
        p.url=(p.url||'').replace(/^[a-z0-9]+:\/\//i,scheme+'://');}
      else{const j=await api('/api/proxies/scheme',{id,scheme});if(j&&j.items)PROXIES=j.items;}
      if(window.clog)window.clog(['ПРОКСИ',hostport(p),'тип '+old+' → '+scheme],'act');
      render();},
  };

  function busy(s,t){const b=$(s);if(b){b.textContent=t;b.disabled=true;}}
  function unbusy(s,t){const b=$(s);if(b){b.textContent=t;b.disabled=false;}}

  $('#padd').addEventListener('click',()=>PX.add());
  $('#pfile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{const cur=$('#pinput').value.trim();
      $('#pinput').value=(cur?cur+'\n':'')+String(r.result||'').trim();
      PX.add();e.target.value='';};
    r.readAsText(f);});
  $('#pcheckSel').addEventListener('click',()=>PX.checkSel());
  $('#pcheckAll').addEventListener('click',()=>PX.checkAll());
  $('#pdel').addEventListener('click',()=>PX.delSel());
  $('#ptoggle').addEventListener('click',()=>PX.toggleSel());
  $('#pfstatus').addEventListener('change',()=>{savePF();render();});
  $('#pftag').addEventListener('change',()=>{savePF();render();});
  $('#pall').addEventListener('change',e=>{
    const ids=filtered().map(p=>p.id);
    if(e.target.checked)ids.forEach(id=>sel.add(id));else ids.forEach(id=>sel.delete(id));
    render();
  });
  $('#ptable').addEventListener('change',e=>{
    const cb=e.target.closest('.psel');if(!cb)return;
    if(cb.checked)sel.add(cb.dataset.id);else sel.delete(cb.dataset.id);
    syncHeadCheckbox();updateControls();
  });
  $('#ptable').addEventListener('click',e=>{
    const t=e.target.closest('.ptype');if(!t)return;
    e.preventDefault();e.stopPropagation();openSchemeMenu(t);
  });

  loadPF();
  load();
})();

</script>
